    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | ITAD Core</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }
        [data-theme="dark"] .error-code {
            color: #fff;
        }
        .error-content {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="bg-surface d-flex flex-column min-vh-100">
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="navbar-brand">
                <i class="bi bi-shield-lock-fill"></i> ITAD Core
            </a>

            <button id="mobile-menu-btn" class="d-none" aria-label="Toggle navigation">
                <i class="bi bi-list"></i>
            </button>

            <div class="nav-wrapper">
                <ul class="nav-links">
                    <li class="dropdown">
                        <a href="#" class="dropdown-toggle">Home <i class="bi bi-chevron-down ms-1" style="font-size:0.8rem;"></i></a>
                        <ul class="dropdown-menu">
                            <li><a href="index.html">Home 1</a></li>
                            <li><a href="home-2.html">Home 2</a></li>
                        </ul>
                    </li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="industries.html">Industries</a></li>
                    <li><a href="case-studies.html">Case Studies</a></li>

                    <li><a href="dashboard.html">Dashboard</a></li>
                    
                </ul>
                <div class="nav-actions">

                    <button id="theme-toggle" aria-label="Toggle Theme">
                        <i class="bi bi-moon"></i>
                    </button>
                    
                    <a href="signup.html" class="btn btn-primary" style="padding: 8px 20px;">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex-grow-1 d-flex align-items-center justify-content-center position-relative text-center px-3" style="margin-top: 80px;">
        <div class="error-code">404</div>
        <div class="error-content fade-up mx-auto max-w-600 glass-panel p-5">
            <i class="bi bi-exclamation-triangle-fill text-accent fs-1 mb-3 d-block"></i>
            <h1 class="mb-3">Page Not Found</h1>
            <p class="text-muted mb-4 fs-5">We couldn't locate the specific resource you were looking for. The link may be broken, or the page has been moved.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="index.html" class="btn btn-primary">Return Home</a>
                <a href="contact.html" class="btn btn-outline">Contact Support</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.from(".error-content", {y: 40, opacity: 0, duration: 1, ease: "back.out(1.7)"});
            gsap.from(".error-code", {scale: 0.8, opacity: 0, duration: 1.5, ease: "power2.out", delay: 0.2});
        });
    </script>
    <script src="assets/js/rtl-toggle.js"></script>
