<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | ITAD Core</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%230B3C5D' viewBox='0 0 16 16'%3E%3Cpath d='M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 63 63 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915l.385 1.99a.5.5 0 0 1-.491.595h-.788a.5.5 0 0 1-.49-.595l.384-1.99A1.5 1.5 0 0 1 8 5'/%3E%3C/svg%3E">
</head>

<body class="bg-surface">
    <div class="auth-wrapper">
        <div class="auth-card fade-up">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand justify-content-center mb-4">
                    <i class="bi bi-shield-lock-fill"></i> ITAD Core
                </a>
                <h2 class="h4">Client Portal Login</h2>
                <p class="text-muted">Access your tracking reports and certificates of destruction.</p>
            </div>
            <form onsubmit="event.preventDefault();">
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold d-block mb-1">Corporate Email</label>
                    <input type="email" class="form-control" placeholder="name@company.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold d-block mb-1">Password</label>
                    <input type="password" class="form-control" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
                </div>
                <div class="mb-4 d-flex align-items-center justify-content-between auth-links">
                    <div class="d-flex align-items-center gap-2">
                        <input type="checkbox" id="remember" style="width: 16px; height: 16px; cursor: pointer;">
                        <label for="remember" class="text-muted" style="font-size: 0.9rem; cursor: pointer;">Remember me</label>
                    </div>
                    <a href="#" class="text-accent" style="font-size: 0.85rem;">Forgot password?</a>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary fs-6 py-3 px-5 mb-4 w-100">Secure Login</button>
                </div>
            </form>

            <div class="d-flex align-items-center my-4">
                <div class="flex-grow-1 border-top" style="opacity: 0.1;"></div>
                <span class="px-3 text-muted" style="font-size: 0.85rem; font-weight: 600;">OR</span>
                <div class="flex-grow-1 border-top" style="opacity: 0.1;"></div>
            </div>

            <div class="social-logins">
                <button class="btn btn-social google">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.5711l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    Continue with Google
                </button>
                <button class="btn btn-social facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                        <path fill="#039be5" d="M24 5A19 19 0 1 0 24 43 19 19 0 1 0 24 5Z"/>
                        <path fill="#fff" d="M26.572,29.036h4.917l0.772-4.995h-5.69V20.84c0-1.21.312-3.111,2.053-3.111l2.583-0.012l0.04-4.832c0,0-2.343-0.433-4.582-0.433c-4.638,0-7.394,2.721-7.394,7.946v3.645h-4.394v4.995h4.394v12.915c0.915,0.13,1.85,0.203,2.801,0.203c0.982,0,1.947-0.078,2.88-0.219V29.036z"/>
                    </svg>
                    Continue with Facebook
                </button>
            </div>
            <div class="text-center mt-4 text-muted">
                Need portal access? <a href="signup.html" class="text-accent fw-bold">Request an account</a>
            </div>
        </div>
    </div>

    <div class="fixed-bottom p-3 d-flex justify-content-end align-items-center bg-transparent">
        <button id="theme-toggle" class="btn btn-outline border-0 bg-transparent text-muted" aria-label="Toggle Theme">
            <i class="bi bi-moon"></i>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.from(".auth-card", { y: 30, opacity: 0, duration: 0.8, ease: "power2.out" });
        });
    </script>
    <script src="assets/js/rtl-toggle.js"></script>
</body>

</html>
