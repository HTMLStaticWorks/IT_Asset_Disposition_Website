<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Access | ITAD Core</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%230B3C5D' viewBox='0 0 16 16'%3E%3Cpath d='M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 63 63 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915l.385 1.99a.5.5 0 0 1-.491.595h-.788a.5.5 0 0 1-.49-.595l.384-1.99A1.5 1.5 0 0 1 8 5'/%3E%3C/svg%3E">
</head>

<body class="bg-surface">
    <div class="auth-wrapper py-5">
        <div class="auth-card fade-up" style="max-width: 550px;">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand justify-content-center mb-4">
                    <i class="bi bi-shield-lock-fill"></i> ITAD Core
                </a>
                <h2 class="h4">Create an Account</h2>
                <p class="text-muted">Create an account to track your organization's IT asset disposition projects
                    globally.</p>
            </div>
            <form onsubmit="event.preventDefault();">
                <div class="row g-3">
                    <div class="col-md-12 mb-1">
                        <label class="form-label text-muted fw-bold d-block mb-1">First Name</label>
                        <input type="text" class="form-control" placeholder="John" required>
                    </div>
                    <div class="col-md-12 mb-1">
                        <label class="form-label text-muted fw-bold d-block mb-1">Last Name</label>
                        <input type="text" class="form-control" placeholder="Doe" required>
                    </div>
                    <div class="col-md-12 mb-1">
                        <label class="form-label text-muted fw-bold d-block mb-1">Corporate Email</label>
                        <input type="email" class="form-control" placeholder="name@company.com" required>
                    </div>
                    <div class="col-md-12 mb-1">
                        <label class="form-label text-muted fw-bold d-block mb-1">Company Name</label>
                        <input type="text" class="form-control" placeholder="Enterprise Inc." required>
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label text-muted fw-bold d-block mb-1">Access Level Required</label>
                        <select class="form-control select-styled" required>
                            <option value="">Select level...</option>
                            <option value="reporting">View Reporting Only</option>
                            <option value="admin">Admin (Request Pickups + Reporting)</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4 d-flex align-items-center gap-2">
                    <input type="checkbox" id="terms" required style="width: 16px; height: 16px; cursor: pointer;">
                    <label for="terms" class="text-muted" style="font-size: 0.9rem; cursor: pointer;">I agree to the <a
                            href="#" class="text-accent">Terms of Service</a> and <a href="#"
                            class="text-accent">Privacy Policy</a></label>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary fs-6 py-3 px-5 mt-2 w-100">Create Account</button>
                </div>
            </form>

            <div class="d-flex align-items-center my-4">
                <div class="flex-grow-1 border-top" style="opacity: 0.1;"></div>
                <span class="px-3 text-muted" style="font-size: 0.85rem; font-weight: 600;">OR</span>
                <div class="flex-grow-1 border-top" style="opacity: 0.1;"></div>
            </div>

            <div class="social-logins">
                <button class="btn btn-social google">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                        <path fill="#FFC107"
                            d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                        <path fill="#FF3D00"
                            d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                        <path fill="#4CAF50"
                            d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                        <path fill="#1976D2"
                            d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.5711l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
                    </svg>
                    Create via Google
                </button>
                <button class="btn btn-social apple">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                        <path fill="currentColor"
                            d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 21.8-88.5 21.8-11.4 0-43.8-19.5-74.2-19-39.4 0-77.2 22.3-101.3 64.1-48.4 84.4-12.4 209.1 34 275.9 22.6 32.7 50.1 69.5 86 68.2 33.4-1.3 45.8-21.7 87.2-21.7 41.3 0 53 21.7 88.2 21 37.1-.6 61.1-33 83.7-65.7 26.1-38.1 36.8-75 37.1-76.9-.8-.3-71.1-27.4-71.3-108.3M249.1 82.5c23.5-28.5 39.3-68.1 35-107.5-33.8 1.4-74.8 22.5-99.1 50.8-21.7 25.1-40.7 65.5-35.6 104 37.9 2.9 76-18.3 99.7-47.3z" />
                    </svg>
                    Create via Apple
                </button>
            </div>
            <div class="text-center mt-4 text-muted border-top border-light pt-4">
                Already have an account? <a href="login.html"
                    class="text-accent fw-bold border-0 bg-transparent text-decoration-none">Return to login</a>
            </div>
        </div>
    </div>

    <div class="fixed-bottom p-3 d-flex justify-content-end align-items-center gap-2 bg-transparent">
        <button id="rtl-toggle" class="nav-btn-icon" aria-label="Toggle RTL Support" style="font-size: 0.75rem; font-weight: 700; line-height: 1;">RTL</button>
        <button id="theme-toggle" class="nav-btn-icon" aria-label="Toggle Theme"><i class="bi bi-moon"></i></button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.from(".auth-card", { y: 30, opacity: 0, duration: 0.8, ease: "power2.out" });
        });
    </script>
    <script src="assets/js/rtl-toggle.js"></script>
</body>

</html>
